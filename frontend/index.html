<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinAssist — Transaction Support</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-top">
    <div class="sidebar-logo">⚡ FinAssist</div>
    <button class="sidebar-new-btn" id="sidebar-new-btn">+ New ticket</button>
  </div>
  <div class="sidebar-tickets" id="sidebar-tickets">
    <div class="sidebar-section-label">Your tickets</div>
    <div id="ticket-list" class="ticket-list"></div>
  </div>
  <div class="sidebar-profile" id="sidebar-profile">
    <div class="profile-avatar" id="profile-avatar">?</div>
    <div class="profile-info">
      <div class="profile-name" id="profile-name">Loading...</div>
      <div class="profile-id" id="profile-id"></div>
    </div>
  </div>
</aside>

<!-- Main area -->
<div class="main-wrap">
  <header>
    <div class="header-left">
      <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
      <div class="header-title" id="header-title">New conversation</div>
    </div>
    <div class="header-right">
      <div class="ticket-badge">
        <span id="ticket-id-display" style="display:none"></span>
        <span id="status-pill" class="status-pill status-open" style="display:none"></span>
      </div>
    </div>
  </header>

  <!-- Progress tracker -->
  <div id="progress-tracker" class="progress-tracker" style="display:none">
    <div class="progress-step" data-step="reported">
      <div class="step-dot"></div>
      <span class="step-label">Reported</span>
    </div>
    <div class="progress-line"></div>
    <div class="progress-step" data-step="reviewing">
      <div class="step-dot"></div>
      <span class="step-label">Reviewing</span>
    </div>
    <div class="progress-line"></div>
    <div class="progress-step" data-step="resolved">
      <div class="step-dot"></div>
      <span class="step-label">Resolved</span>
    </div>
  </div>

  <div id="chat-area">
    <div class="welcome-block">
      <div class="welcome-avatar">👋</div>
      <div class="welcome-heading" id="welcome-greeting">Hey there!</div>
      <div class="welcome-sub">We're here to help with your transaction. Pick what's going on, or tell us in your own words.</div>
      <div class="topic-tiles" id="topic-tiles">
        <button class="topic-tile tile-upi" data-msg="My UPI payment is stuck — the amount was debited but not received by the merchant">
          <span class="tile-emoji">💸</span>
          <div class="tile-text">
            <span class="tile-label">UPI payment stuck</span>
            <span class="tile-desc">Debited but not received</span>
          </div>
        </button>
        <button class="topic-tile tile-pot" data-msg="My Savings Pot withdrawal is pending and the money hasn't arrived in my account">
          <span class="tile-emoji">🏦</span>
          <div class="tile-text">
            <span class="tile-label">Pot withdrawal pending</span>
            <span class="tile-desc">Money not in account yet</span>
          </div>
        </button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <input id="user-input" type="text" placeholder="Describe your issue..." autocomplete="off" />
    <button id="send-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<canvas id="confetti-canvas"></canvas>

<script src="/static/app.js"></script>
</body>
</html>
